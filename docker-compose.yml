services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: marksuser
      POSTGRES_PASSWORD: markspass
      POSTGRES_DB: marksdb
    # Pre-seed script is required as a volume to load mock database
    # Data inside the container is lost on restart unless you persist it with a volume.
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    depends_on:
      - backend
      - db
    environment:
      DB_HOST: db
      DB_NAME:  marksdb
      DB_USER: marksuser
      DB_PASSWORD: markspass
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    depends_on:
      - frontend
      - db
    # TODO: you will need to add to this
    ports:
      - "8080:8080"

  automark:
    build: ./automark
    depends_on:
      - backend
      - db
    profiles:
      - debug
